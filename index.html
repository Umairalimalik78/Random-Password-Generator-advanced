<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section id="passwordGenerator">
        <h1>Password Generator</h1>
        <p id="password">Generate your password</p>
        <div class="lengthRange">
            <label for="length">Password Length: <span id="lengthValue">12</span></label>
            <input type="range" id="length" name="length" min="4" max="20" value="12">
        </div>
        <div class="settingOptions">
            <label>Settings:</label>
            <div class="toggleSwitch">
                <span>Uppercase</span>
                <div class="toggle active" id="includeUppercase" data-state="true"></div>
            </div>
            <div class="toggleSwitch">
                <span>Lowercase</span>
                <div class="toggle active" id="includeLowercase" data-state="true"></div>
            </div>
            <div class="toggleSwitch">
                <span>Numbers</span>
                <div class="toggle active" id="includeNumbers" data-state="true"></div>
            </div>
            <div class="toggleSwitch">
                <span>Symbols</span>
                <div class="toggle active" id="includeSymbols" data-state="true"></div>
            </div>
        </div>

        <button id="generate">Generate Password</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
